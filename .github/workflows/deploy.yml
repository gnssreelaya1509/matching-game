jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet  # Ensure flet is installed

      # THIS IS WHAT YOU ARE MISSING:
      - name: Install Flet build requirements
        run: |
          flet build web --base-url /minesweeper/ --no-prompt