name: Deploy Flet App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Automatically detects if you have a requirements file or just needs flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install flet; fi

      - name: Build web app
        # Added --yes to automatically confirm Flutter SDK installation
        # Added --no-prompt to ensure no manual input is needed
        run: flet build web --base-url /${{ github.event.repository.name }}/ --no-prompt --yes

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web