name: Deploy Flet App

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Added mesa-utils to resolve the eglinfo rendering error
          sudo apt-get install -y libgtk-3-dev libx11-dev mesa-utils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install flet; fi

      - name: Run Flet Doctor
        run: flet doctor

      - name: Build web app
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
        run: |
          # 'yes |' handles automatic confirmation prompts
          # Log redirection prevents "Broken pipe" errors
          yes | flet build web --base-url /${{ github.event.repository.name }}/ > build_log.txt 2>&1 || cat build_log.txt
          # Create 404 fallback to fix routing issues in Single Page Applications
          cp build/web/index.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4